services:
  sandbox:
    build: .
    image: ghcr.io/cth/skill-sandbox:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace:/workspace/sandbox
      - NODE_PATH=/home/sandbox/node_packages/node_modules

    # Security defaults (good for teammates-only)
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Resource limits (prevents accidental runaway)
    pids_limit: 256
    mem_limit: 2g
    cpus: "2"

    # Disable network by default (override with `make run-net`)
    network_mode: "none"
