name: Build Sandbox & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build ────────────────────────────────────────────
      - name: Build sandbox image
        run: docker compose build

      # ── Smoke test: runner works ─────────────────────────
      - name: Smoke test (template skill)
        run: |
          docker compose run --rm sandbox \
            --skill _template --entry run.py -- hello world

      # ── Environment verification ─────────────────────────
      # Proves ALL system tools + Python + Node packages are
      # installed and importable. This is the real gate —
      # if this passes, any skill that uses these deps will work.
      - name: Verify system tools
        run: |
          docker compose run --rm --entrypoint bash sandbox -c "
            echo '── System tools ──' && \
            soffice --version && \
            pdftoppm -v 2>&1 | head -1 && \
            pandoc --version | head -1 && \
            tesseract --version 2>&1 | head -1 && \
            ffmpeg -version 2>&1 | head -1 && \
            pnpm --version && \
            echo '── All system tools OK ──'
          "

      - name: Verify Python packages
        run: |
          docker compose run --rm --entrypoint bash sandbox -c \
            "python -c 'import pypdf,pdfplumber,reportlab,docx,pptx,openpyxl,pandas,PIL,imageio,numpy,playwright,yaml,defusedxml,mcp,anthropic,pydantic,rich; print(\"All Python imports OK\")'"

      - name: Verify Node.js packages
        run: |
          docker compose run --rm --entrypoint bash sandbox -c \
            "node -e \"require('pptxgenjs');require('docx');require('pdf-lib');console.log('All Node imports OK')\""

      # ── Integration test: docx-to-pdf demo ───────────────
      - name: Run docx-to-pdf demo
        run: |
          docker compose run --rm sandbox \
            --skill docx-to-pdf --entry demo.py

      - name: Copy demo output from container tmp
        run: |
          docker compose run --rm --entrypoint bash sandbox -c \
            "cp /tmp/docx-to-pdf/demo_output.pdf /workspace/demo_output.pdf 2>/dev/null || true"

      - name: Upload generated PDF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-output-pdf
          path: demo_output.pdf
          if-no-files-found: ignore

  push-image:
    needs: build-and-verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
